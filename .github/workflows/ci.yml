name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check "apps/**/*.ts" "libs/**/*.ts"

      - name: Lint
        run: npx eslint "{src,apps,libs}/**/*.ts"

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint-and-format
    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - catalog-service
          - order-service
          - payment-service
          - inventory-service
          - notification-service
          - shipping-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests for ${{ matrix.service }}
        run: npx jest --testPathPattern="apps/${{ matrix.service }}" --passWithNoTests

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - catalog-service
          - order-service
          - payment-service
          - inventory-service
          - notification-service
          - shipping-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.service }}
        run: npx nest build ${{ matrix.service }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-dist
          path: dist/apps/${{ matrix.service }}
          retention-days: 7
